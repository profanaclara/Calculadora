<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calculadorinha pra minha namoradinha 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --lavender: #EDE7F6;
  --lilac:    #D1C4E9;
  --violet:   #B39DDB;
  --purple:   #9575CD;
  --deep:     #7E57C2;
  --ink:      #4527A0;
  --rose:     #F8BBD0;
  --rose2:    #F48FB1;
  --mint:     #B2EBF2;
  --cream:    #FDF6FF;
  --white:    #FFFFFF;
  --shadow:   0 4px 20px rgba(149,117,205,.18);
  --shadow-sm:0 2px 8px rgba(149,117,205,.12);
  --r:        16px;
  --r-sm:     10px;
}

body{
  background: var(--lavender);
  background-image:
    radial-gradient(circle at 15% 20%, #E8D5F5 0%, transparent 40%),
    radial-gradient(circle at 85% 80%, #FCE4EC 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, #E3F2FD22 0%, transparent 60%);
  min-height:100vh;
  font-family:'Nunito',sans-serif;
  color:var(--ink);
  padding:24px 16px 80px;
}

/* sparkle bg dots */
body::before{
  content:'✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦';
  position:fixed;top:0;left:0;right:0;
  font-size:10px;letter-spacing:28px;line-height:3;
  color:rgba(179,157,219,.25);pointer-events:none;
  word-break:break-all;overflow:hidden;height:100vh;
  z-index:0;white-space:pre-wrap;
}

.app{max-width:560px;margin:0 auto;position:relative;z-index:1}

/* ── HEADER ── */
.header{text-align:center;margin-bottom:28px}
.header h1{
  font-family:'Quicksand',sans-serif;
  font-weight:700;font-size:1.5rem;
  color:var(--deep);
  line-height:1.3;margin-bottom:4px;
}
.header p{font-size:.85rem;color:var(--violet);font-weight:600}

/* ── CARD ── */
.card{
  background:var(--white);
  border-radius:var(--r);
  padding:24px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
  border:2px solid rgba(179,157,219,.3);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both;
}
.card.hidden{display:none}

@keyframes popIn{
  from{opacity:0;transform:scale(.95) translateY(8px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.card-title{
  font-family:'Quicksand',sans-serif;
  font-weight:700;font-size:1rem;
  color:var(--deep);margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.card-title .emoji{font-size:1.2rem}

/* ── MODO DE PESO ── */
.mode-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:0}
.mode-btn{
  background:var(--lavender);
  border:2px solid var(--lilac);
  border-radius:var(--r-sm);
  padding:12px 8px;
  font-family:'Nunito',sans-serif;
  font-weight:700;font-size:.78rem;
  color:var(--purple);
  cursor:pointer;transition:all .2s;
  text-align:center;line-height:1.4;
}
.mode-btn .icon{font-size:1.4rem;display:block;margin-bottom:4px}
.mode-btn:hover{border-color:var(--purple);background:#EDE7F6;transform:translateY(-2px)}
.mode-btn.active{
  background:linear-gradient(135deg,var(--violet),var(--purple));
  border-color:var(--deep);color:#fff;
  box-shadow:0 4px 12px rgba(126,87,194,.35);
  transform:translateY(-2px);
}

/* ── NOTA MÁXIMA ── */
.nota-row{display:flex;align-items:center;gap:12px;margin-top:16px}
.nota-row label{font-weight:700;font-size:.85rem;color:var(--purple);white-space:nowrap}
.nota-input{
  flex:1;border:2px solid var(--lilac);border-radius:var(--r-sm);
  padding:10px 14px;font-family:'Nunito',sans-serif;font-weight:700;
  font-size:1.1rem;color:var(--ink);background:var(--cream);
  transition:border-color .2s;text-align:center;
}
.nota-input:focus{outline:none;border-color:var(--purple)}

.arred-row{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.arred-row label{font-weight:700;font-size:.85rem;color:var(--purple)}
.arred-btn{
  border:2px solid var(--lilac);background:var(--lavender);
  border-radius:20px;padding:5px 12px;font-size:.78rem;font-family:'Nunito',sans-serif;
  font-weight:700;color:var(--purple);cursor:pointer;transition:all .18s;
}
.arred-btn:hover{border-color:var(--purple)}
.arred-btn.active{background:var(--purple);color:#fff;border-color:var(--deep)}

/* ── QUESTÕES ── */
.q-card{
  background:var(--cream);
  border:2px solid var(--lilac);
  border-radius:var(--r-sm);
  margin-bottom:12px;
  overflow:hidden;
  transition:box-shadow .2s;
}
.q-card:hover{box-shadow:var(--shadow-sm)}

.q-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  background:linear-gradient(135deg,rgba(209,196,233,.4),rgba(248,187,208,.25));
  border-bottom:1px solid var(--lilac);
}
.q-num{
  font-family:'Quicksand',sans-serif;font-weight:700;
  font-size:.9rem;color:var(--deep);
  background:rgba(149,117,205,.15);
  border-radius:20px;padding:2px 10px;white-space:nowrap;
}
.q-header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.q-peso-badge{
  font-size:.75rem;font-weight:800;
  background:var(--violet);color:#fff;
  border-radius:20px;padding:2px 10px;
}
.q-del{border:none;background:none;cursor:pointer;font-size:1rem;color:var(--violet);padding:2px 4px;border-radius:6px;transition:all .15s}
.q-del:hover{background:#FCE4EC;color:#E91E63}

.q-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px}

/* peso por questão */
.peso-field{display:flex;align-items:center;gap:8px}
.peso-field label{font-size:.78rem;font-weight:700;color:var(--purple);white-space:nowrap}
.peso-field input{
  width:80px;border:2px solid var(--lilac);border-radius:8px;
  padding:6px 10px;font-family:'Nunito',sans-serif;font-weight:700;
  font-size:.9rem;color:var(--ink);background:var(--white);text-align:center;
  transition:border-color .2s;
}
.peso-field input:focus{outline:none;border-color:var(--purple)}

/* subquestões */
.subq-section{}
.subq-count-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.subq-count-row label{font-size:.78rem;font-weight:700;color:var(--purple)}
.num-stepper{display:flex;align-items:center;gap:6px}
.step-btn{
  width:28px;height:28px;border:2px solid var(--lilac);border-radius:50%;
  background:var(--lavender);cursor:pointer;font-size:1rem;font-weight:700;
  color:var(--purple);display:flex;align-items:center;justify-content:center;
  transition:all .15s;line-height:1;padding:0;font-family:'Nunito',sans-serif;
}
.step-btn:hover{border-color:var(--purple);background:var(--lilac)}
.step-count{
  min-width:28px;text-align:center;font-weight:800;font-size:.9rem;color:var(--deep);
}

.subq-list{display:flex;flex-direction:column;gap:6px}
.subq-row{
  display:flex;align-items:center;gap:8px;
  background:rgba(237,231,246,.5);border-radius:8px;padding:6px 10px;
}
.subq-label{font-size:.8rem;font-weight:700;color:var(--violet);min-width:24px}
.subq-pts-input{
  width:70px;border:1.5px solid var(--lilac);border-radius:7px;
  padding:5px 8px;font-family:'Nunito',sans-serif;font-weight:700;
  font-size:.85rem;color:var(--ink);background:var(--white);text-align:center;
}
.subq-pts-input:focus{outline:none;border-color:var(--purple)}
.subq-pts-label{font-size:.75rem;color:var(--violet);font-weight:600}
.subq-auto{font-size:.72rem;color:var(--violet);font-weight:600;font-style:italic}

/* ── BOTÕES ── */
.btn-add-q{
  width:100%;border:2px dashed var(--violet);background:rgba(237,231,246,.5);
  border-radius:var(--r-sm);padding:10px;font-family:'Nunito',sans-serif;
  font-weight:700;font-size:.88rem;color:var(--purple);cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:4px;
}
.btn-add-q:hover{background:var(--lilac);border-color:var(--purple);transform:translateY(-1px)}

.btn-primary{
  width:100%;border:none;border-radius:var(--r-sm);
  padding:13px;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;
  cursor:pointer;transition:all .2s;margin-top:16px;
  background:linear-gradient(135deg,var(--violet),var(--deep));
  color:#fff;box-shadow:0 4px 14px rgba(126,87,194,.35);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(126,87,194,.45)}
.btn-primary:active{transform:translateY(0)}

.btn-secondary{
  border:2px solid var(--violet);background:transparent;
  border-radius:var(--r-sm);padding:10px 18px;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;
  color:var(--purple);cursor:pointer;transition:all .2s;
}
.btn-secondary:hover{background:var(--lavender);transform:translateY(-1px)}

/* ── AVISO PESO ── */
.weight-alert{
  border-radius:var(--r-sm);padding:10px 14px;font-size:.82rem;font-weight:700;
  display:flex;align-items:center;gap:8px;margin-top:10px;
}
.weight-alert.ok{background:#E8F5E9;color:#2E7D32;border:1.5px solid #A5D6A7}
.weight-alert.warn{background:#FFF8E1;color:#F57F17;border:1.5px solid #FFE082}
.weight-alert.err{background:#FCE4EC;color:#AD1457;border:1.5px solid #F48FB1}

/* ── ACERTOS ── */
.acerto-card{
  background:var(--cream);border:2px solid var(--lilac);
  border-radius:var(--r-sm);margin-bottom:10px;overflow:hidden;
}
.acerto-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:linear-gradient(135deg,rgba(209,196,233,.4),rgba(248,187,208,.2));
  border-bottom:1px solid var(--lilac);
}
.acerto-title{font-family:'Quicksand',sans-serif;font-weight:700;font-size:.88rem;color:var(--deep)}
.acerto-pts{margin-left:auto;font-size:.75rem;font-weight:800;color:var(--purple)}
.acerto-body{padding:10px 14px;display:flex;flex-direction:column;gap:8px}

.acerto-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.acerto-label{font-size:.8rem;font-weight:700;color:var(--violet);min-width:28px}
.acerto-desc{flex:1;font-size:.82rem;color:var(--purple)}
.acerto-val{font-size:.75rem;font-weight:700;color:var(--violet)}

/* questão simples: campo de quantas acertou */
.acerto-simples{display:flex;align-items:center;gap:10px;padding:8px 0}
.acerto-simples label{font-size:.82rem;font-weight:700;color:var(--purple)}
.acerto-num-input{
  width:64px;border:2px solid var(--lilac);border-radius:8px;
  padding:6px 10px;font-family:'Nunito',sans-serif;font-weight:800;
  font-size:.95rem;color:var(--ink);background:var(--white);text-align:center;
}
.acerto-num-input:focus{outline:none;border-color:var(--purple)}
.acerto-de{font-size:.8rem;color:var(--violet);font-weight:700}

/* botões certo/errado */
.check-btns{display:flex;gap:5px}
.ck{
  border:2px solid var(--lilac);background:var(--white);
  border-radius:8px;padding:5px 11px;
  font-size:.85rem;font-family:'Nunito',sans-serif;font-weight:700;
  cursor:pointer;transition:all .15s;color:var(--violet);
}
.ck:hover{border-color:var(--purple)}
.ck.ok{background:#E8F5E9;color:#2E7D32;border-color:#81C784}
.ck.no{background:#FCE4EC;color:#AD1457;border-color:#F48FB1}

/* ── RESULTADO ── */
.result-big{
  text-align:center;
  background:linear-gradient(135deg,#F3E5F5,#FCE4EC);
  border:2px solid var(--violet);border-radius:var(--r);
  padding:28px 20px;margin-bottom:16px;
}
.result-num{
  font-family:'Quicksand',sans-serif;font-weight:700;
  font-size:4.5rem;line-height:1;letter-spacing:-2px;
  margin-bottom:4px;
}
.result-num.pass{color:var(--deep)}
.result-num.fail{color:#C2185B}
.result-sub{font-size:.88rem;color:var(--purple);font-weight:600;margin-top:4px}
.result-emoji{font-size:2rem;margin-bottom:8px}

.detail-list{border-left:3px solid var(--lilac);padding-left:14px;margin-bottom:16px}
.detail-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid rgba(209,196,233,.4);
  font-size:.82rem;font-weight:600;
}
.detail-row:last-child{border-bottom:none}
.detail-row.c{color:#2E7D32}
.detail-row.e{color:#AD1457}
.dr-val{font-weight:800;font-family:'Quicksand',sans-serif}

.result-actions{display:flex;gap:8px;flex-wrap:wrap}
.result-actions .btn-secondary{flex:1}

/* ── UTIL ── */
.hidden{display:none!important}
.divider{height:1px;background:var(--lilac);margin:16px 0}

/* scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--lavender)}
::-webkit-scrollbar-thumb{background:var(--violet);border-radius:3px}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h1>🌸 Calculadorinha<br>pra minha namoradinha 🌸</h1>
    <p>✨ calculando notinhas com amor ✨</p>
  </div>

  <!-- PASSO 1: CONFIGURAR -->
  <div class="card" id="step-config">
    <div class="card-title"><span class="emoji">⚙️</span> Configurar a prova</div>

    <div class="nota-row">
      <label>Nota máxima:</label>
      <input class="nota-input" type="number" id="nota-max" value="10" min="0.01" step="any" style="max-width:100px"/>
    </div>

    <div class="arred-row" style="margin-top:14px">
      <label>Arredondar:</label>
      <button class="arred-btn active" data-r="none">Nenhum</button>
      <button class="arred-btn" data-r="half">½ conv.</button>
      <button class="arred-btn" data-r="up">↑ cima</button>
      <button class="arred-btn" data-r="down">↓ baixo</button>
    </div>

    <div class="divider"></div>

    <div class="card-title" style="margin-bottom:10px"><span class="emoji">⚖️</span> Tipo de peso</div>
    <div class="mode-grid">
      <button class="mode-btn active" data-mode="equal">
        <span class="icon">🟰</span>Igual pra todas
      </button>
      <button class="mode-btn" data-mode="qpeso">
        <span class="icon">🎚️</span>Peso por questão
      </button>
      <button class="mode-btn" data-mode="sqpeso">
        <span class="icon">🔬</span>Peso por subquestão
      </button>
    </div>

    <button class="btn-primary" id="btn-to-q">Montar questões 🌷</button>
  </div>

  <!-- PASSO 2: QUESTÕES -->
  <div class="card hidden" id="step-questions">
    <div class="card-title"><span class="emoji">📝</span> Questões</div>
    <div id="questions-container"></div>
    <button class="btn-add-q" id="btn-add-q">＋ Nova questão</button>
    <div id="weight-alert" class="weight-alert" style="display:none"></div>
    <button class="btn-primary" id="btn-to-grade">Corrigir 🖊️</button>
  </div>

  <!-- PASSO 3: ACERTOS -->
  <div class="card hidden" id="step-grade">
    <div class="card-title"><span class="emoji">✅</span> Lançar acertos</div>
    <div id="grade-container"></div>
    <button class="btn-primary" id="btn-calc">Ver nota 🌟</button>
  </div>

  <!-- RESULTADO -->
  <div class="card hidden" id="step-result">
    <div class="card-title"><span class="emoji">🎀</span> Resultado</div>
    <div class="result-big" id="result-big"></div>
    <div class="detail-list" id="detail-list"></div>
    <div class="result-actions">
      <button class="btn-secondary" id="btn-back-grade">← Corrigir</button>
      <button class="btn-secondary" id="btn-new">Nova prova 🌸</button>
    </div>
  </div>

</div>

<script>
// ── Estado ──────────────────────────────────
const S = {
  notaMax: 10,
  modo: 'equal',   // equal | qpeso | sqpeso
  round: 'none',
  questions: [],   // [{id, peso, numSubq, subqPesos:[]}]
  answers: {},     // {qid: number | {a:bool,b:bool,...}}
};

let qid = 0;
const $ = id => document.getElementById(id);

// ── Helpers ──────────────────────────────────
function fmt(v) {
  const d = parseInt($('nota-max')?.value) > 100 ? 0 :
            S.notaMax % 1 !== 0 ? 2 : 1;
  return parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function letters(i){ return String.fromCharCode(97+i) }

// ── Renderizar questões ───────────────────────
function renderQuestions() {
  const c = $('questions-container');
  c.innerHTML = '';

  S.questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'q-card';

    // calcular badge
    let badge = '';
    if (S.modo === 'equal') {
      const val = S.notaMax / S.questions.length;
      badge = `${fmt(val)} pt`;
    } else if (S.modo === 'qpeso') {
      badge = q.peso ? `${fmt(q.peso)} pt` : '? pt';
    } else {
      const t = q.subqPesos.reduce((a,v)=>a+(parseFloat(v)||0),0);
      badge = t ? `${fmt(t)} pt` : '? pt';
    }

    div.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q${qi+1}</span>
        <span class="q-peso-badge">${badge}</span>
        <div class="q-header-right">
          <button class="q-del" data-qid="${q.id}" title="Remover">✕</button>
        </div>
      </div>
      <div class="q-body" id="qbody-${q.id}"></div>`;

    c.appendChild(div);
    renderQBody(q, qi);
  });

  checkWeightAlert();
}

function renderQBody(q, qi) {
  const body = $(`qbody-${q.id}`);
  body.innerHTML = '';

  // PESO POR QUESTÃO
  if (S.modo === 'qpeso') {
    const pf = document.createElement('div');
    pf.className = 'peso-field';
    pf.innerHTML = `<label>Valor:</label>
      <input type="number" min="0" step="any" placeholder="pts"
        value="${q.peso||''}" data-qid="${q.id}" data-f="peso"/>
      <span style="font-size:.78rem;color:var(--violet);font-weight:600">pts</span>`;
    body.appendChild(pf);
  }

  // SUBQUESTÕES (todos os modos podem ter)
  const sq = document.createElement('div');
  sq.className = 'subq-section';

  // stepper de quantidade
  const cr = document.createElement('div');
  cr.className = 'subq-count-row';
  cr.innerHTML = `<label>Subquestões:</label>
    <div class="num-stepper">
      <button class="step-btn" data-qid="${q.id}" data-act="minus">−</button>
      <span class="step-count" id="sqcount-${q.id}">${q.numSubq}</span>
      <button class="step-btn" data-qid="${q.id}" data-act="plus">+</button>
    </div>`;
  sq.appendChild(cr);

  // lista de subq
  if (q.numSubq > 0) {
    const list = document.createElement('div');
    list.className = 'subq-list';

    for (let i = 0; i < q.numSubq; i++) {
      const row = document.createElement('div');
      row.className = 'subq-row';

      if (S.modo === 'sqpeso') {
        row.innerHTML = `
          <span class="subq-label">${letters(i)})</span>
          <input class="subq-pts-input" type="number" min="0" step="any"
            placeholder="pts" value="${q.subqPesos[i]||''}"
            data-qid="${q.id}" data-si="${i}" data-f="sqpeso"/>
          <span class="subq-pts-label">pts</span>`;
      } else {
        // auto dividido
        const each = (S.modo === 'equal')
          ? (S.notaMax / S.questions.length / q.numSubq)
          : (q.peso ? q.peso / q.numSubq : null);
        const txt = each ? fmt(each) + ' pt' : '—';
        row.innerHTML = `
          <span class="subq-label">${letters(i)})</span>
          <span class="subq-auto">${txt} cada</span>`;
      }
      list.appendChild(row);
    }
    sq.appendChild(list);
  }

  body.appendChild(sq);
}

// ── Verificar peso total ──────────────────────
function checkWeightAlert() {
  const alert = $('weight-alert');
  if (S.modo === 'equal') { alert.style.display='none'; return; }

  let total = 0;
  if (S.modo === 'qpeso') {
    total = S.questions.reduce((a,q) => a + (parseFloat(q.peso)||0), 0);
  } else {
    total = S.questions.reduce((a,q) =>
      a + q.subqPesos.reduce((b,v) => b + (parseFloat(v)||0), 0), 0);
  }

  const diff = Math.abs(total - S.notaMax);
  alert.style.display = 'flex';

  if (total === 0) {
    alert.className = 'weight-alert warn';
    alert.innerHTML = '⚠️ Preencha os valores das questões!';
  } else if (diff < 0.0001) {
    alert.className = 'weight-alert ok';
    alert.innerHTML = `✅ Total: ${fmt(total)} pts — tudo certinho! 🌸`;
  } else if (total > S.notaMax) {
    alert.className = 'weight-alert err';
    alert.innerHTML = `😱 Total (${fmt(total)}) maior que nota máxima (${fmt(S.notaMax)})! Diminui aí~`;
  } else {
    alert.className = 'weight-alert warn';
    alert.innerHTML = `⚠️ Total (${fmt(total)}) menor que nota máxima (${fmt(S.notaMax)}). Ainda falta ${fmt(S.notaMax-total)} pt.`;
  }
}

// ── Arredondamento ────────────────────────────
function doRound(val) {
  const d = S.notaMax % 1 !== 0 ? 2 : 1;
  const f = Math.pow(10, d);
  if (S.round === 'up')   return Math.ceil(val*f)/f;
  if (S.round === 'down') return Math.floor(val*f)/f;
  if (S.round === 'half') return Math.round(val*f)/f;
  return Math.trunc(val*f)/f;
}

// ── Renderizar grade de acertos ───────────────
function renderGrade() {
  const c = $('grade-container');
  c.innerHTML = '';

  S.questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'acerto-card';

    // pts desta questão
    let qPts;
    if (S.modo === 'equal') qPts = S.notaMax / S.questions.length;
    else if (S.modo === 'qpeso') qPts = parseFloat(q.peso)||0;
    else qPts = q.subqPesos.reduce((a,v)=>a+(parseFloat(v)||0),0);

    div.innerHTML = `
      <div class="acerto-header">
        <span class="acerto-title">Q${qi+1}</span>
        <span class="acerto-pts">${fmt(qPts)} pts</span>
      </div>
      <div class="acerto-body" id="gbody-${q.id}"></div>`;

    c.appendChild(div);
    renderGBody(q, qi, qPts);
  });
}

function renderGBody(q, qi, qPts) {
  const body = $(`gbody-${q.id}`);
  body.innerHTML = '';

  if (q.numSubq === 0) {
    // sem subquestão: marcar certo/errado direto
    const row = document.createElement('div');
    row.className = 'acerto-simples';
    const ans = S.answers[q.id];
    row.innerHTML = `
      <div class="check-btns">
        <button class="ck ${ans==='c'?'ok':''}" data-qid="${q.id}" data-v="c">✓ Certo</button>
        <button class="ck ${ans==='e'?'no':''}" data-qid="${q.id}" data-v="e">✗ Errado</button>
      </div>`;
    body.appendChild(row);
    return;
  }

  // tem subquestões
  if (S.modo === 'sqpeso') {
    // cada subq certo/errado separado
    for (let i = 0; i < q.numSubq; i++) {
      const pts = parseFloat(q.subqPesos[i])||0;
      const key = `${q.id}_${i}`;
      const ans = S.answers[key];
      const row = document.createElement('div');
      row.className = 'acerto-row';
      row.innerHTML = `
        <span class="acerto-label">${letters(i)})</span>
        <span class="acerto-val">${fmt(pts)} pt</span>
        <div class="check-btns" style="margin-left:auto">
          <button class="ck ${ans==='c'?'ok':''}" data-key="${key}" data-v="c">✓</button>
          <button class="ck ${ans==='e'?'no':''}" data-key="${key}" data-v="e">✗</button>
        </div>`;
      body.appendChild(row);
    }
  } else {
    // igual/qpeso com subq: campo "quantas acertou"
    const each = qPts / q.numSubq;
    const cur = S.answers[q.id] ?? '';
    const row = document.createElement('div');
    row.className = 'acerto-simples';
    row.innerHTML = `
      <label>Acertou</label>
      <input class="acerto-num-input" type="number" min="0" max="${q.numSubq}"
        step="1" value="${cur}" data-qid="${q.id}" data-max="${q.numSubq}" data-each="${each}"/>
      <span class="acerto-de">de ${q.numSubq} (${fmt(each)} pt cada)</span>`;
    body.appendChild(row);
  }
}

// ── Calcular nota ─────────────────────────────
function calcNota() {
  let earned = 0;
  const details = [];

  S.questions.forEach((q, qi) => {
    let qPts;
    if (S.modo === 'equal') qPts = S.notaMax / S.questions.length;
    else if (S.modo === 'qpeso') qPts = parseFloat(q.peso)||0;
    else qPts = q.subqPesos.reduce((a,v)=>a+(parseFloat(v)||0),0);

    if (q.numSubq === 0 && S.modo !== 'sqpeso') {
      const ans = S.answers[q.id];
      if (ans === 'c') { earned += qPts; details.push({label:`Q${qi+1}`,got:qPts,max:qPts,ok:true}) }
      else { details.push({label:`Q${qi+1}`,got:0,max:qPts,ok:false}) }
    } else if (S.modo === 'sqpeso') {
      let qEarned = 0;
      for (let i = 0; i < q.numSubq; i++) {
        const pts = parseFloat(q.subqPesos[i])||0;
        const key = `${q.id}_${i}`;
        const ans = S.answers[key];
        if (ans === 'c') qEarned += pts;
        details.push({label:`Q${qi+1}${letters(i)}`,got:ans==='c'?pts:0,max:pts,ok:ans==='c'});
      }
      earned += qEarned;
    } else {
      // numSubq > 0, modo equal ou qpeso
      const count = parseInt(S.answers[q.id]) || 0;
      const each = qPts / q.numSubq;
      const got = each * count;
      earned += got;
      details.push({label:`Q${qi+1}`,got,max:qPts,ok:got>=qPts});
    }
  });

  const final = doRound(earned);
  return {final, earned, details};
}

// ── Mostrar resultado ─────────────────────────
function showResult() {
  const {final, earned, details} = calcNota();
  const pass = final >= S.notaMax * 0.5;

  const emojis = pass
    ? ['🎉','🌟','🎀','✨','💜','🥳'][Math.floor(Math.random()*6)]
    : ['😢','💪','📚','🫂','🌱'][Math.floor(Math.random()*5)];

  $('result-big').innerHTML = `
    <div class="result-emoji">${emojis}</div>
    <div class="result-num ${pass?'pass':'fail'}">${fmt(final)}</div>
    <div class="result-sub">de ${fmt(S.notaMax)} pontos</div>`;

  $('detail-list').innerHTML = details.map(d =>
    `<div class="detail-row ${d.ok?'c':'e'}">
      <span>${d.label}</span>
      <span class="dr-val">${fmt(d.got)} / ${fmt(d.max)}</span>
    </div>`).join('');
}

// ── Evento: delegação ─────────────────────────
document.addEventListener('click', e => {

  // modo tipo peso
  if (e.target.closest('.mode-btn')) {
    const btn = e.target.closest('.mode-btn');
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    S.modo = btn.dataset.mode;
    renderQuestions();
    return;
  }

  // arredondamento
  if (e.target.closest('.arred-btn')) {
    document.querySelectorAll('.arred-btn').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
    S.round = e.target.dataset.r;
    return;
  }

  // remover questão
  if (e.target.closest('.q-del')) {
    const id = e.target.closest('.q-del').dataset.qid;
    S.questions = S.questions.filter(q=>q.id!==id);
    renderQuestions();
    return;
  }

  // stepper subq
  if (e.target.closest('.step-btn')) {
    const btn = e.target.closest('.step-btn');
    const id = btn.dataset.qid, act = btn.dataset.act;
    const q = S.questions.find(q=>q.id===id);
    if (!q) return;
    if (act==='plus') q.numSubq = Math.min(26, q.numSubq+1);
    if (act==='minus') q.numSubq = Math.max(0, q.numSubq-1);
    // sync subqPesos array
    while (q.subqPesos.length < q.numSubq) q.subqPesos.push('');
    renderQuestions();
    return;
  }

  // check certo/errado (grade)
  if (e.target.closest('.ck')) {
    const btn = e.target.closest('.ck');
    const qid = btn.dataset.qid, key = btn.dataset.key, v = btn.dataset.v;
    const ref = key || qid;
    S.answers[ref] = (S.answers[ref]===v) ? null : v;
    renderGrade();
    return;
  }

  // nav
  if (e.target.id==='btn-to-q') {
    S.notaMax = parseFloat($('nota-max').value)||10;
    if (S.questions.length===0) addQuestion();
    renderQuestions();
    $('step-questions').classList.remove('hidden');
    $('step-questions').scrollIntoView({behavior:'smooth',block:'start'});
  }
  if (e.target.id==='btn-add-q') { addQuestion(); renderQuestions(); }
  if (e.target.id==='btn-to-grade') {
    S.answers = {};
    renderGrade();
    $('step-grade').classList.remove('hidden');
    $('step-result').classList.add('hidden');
    $('step-grade').scrollIntoView({behavior:'smooth',block:'start'});
  }
  if (e.target.id==='btn-calc') {
    showResult();
    $('step-result').classList.remove('hidden');
    $('step-result').scrollIntoView({behavior:'smooth',block:'start'});
  }
  if (e.target.id==='btn-back-grade') {
    $('step-result').classList.add('hidden');
    $('step-grade').scrollIntoView({behavior:'smooth',block:'start'});
  }
  if (e.target.id==='btn-new') {
    if (!confirm('Começar nova prova? 🌸')) return;
    S.questions=[]; S.answers={};
    $('step-questions').classList.add('hidden');
    $('step-grade').classList.add('hidden');
    $('step-result').classList.add('hidden');
    window.scrollTo({top:0,behavior:'smooth'});
  }
});

// ── Evento: inputs questões ───────────────────
document.addEventListener('input', e => {
  const el = e.target;

  // peso por questão
  if (el.dataset.f === 'peso') {
    const q = S.questions.find(q=>q.id===el.dataset.qid);
    if (q) { q.peso = el.value; checkWeightAlert(); }
    // atualizar badge inline
    const card = el.closest('.q-card');
    if (card) {
      const badge = card.querySelector('.q-peso-badge');
      if (badge && el.value) badge.textContent = `${parseFloat(el.value)||0} pt`;
    }
  }

  // peso subquestão
  if (el.dataset.f === 'sqpeso') {
    const q = S.questions.find(q=>q.id===el.dataset.qid);
    const si = parseInt(el.dataset.si);
    if (q) { q.subqPesos[si] = el.value; checkWeightAlert(); }
    const card = el.closest('.q-card');
    if (card) {
      const badge = card.querySelector('.q-peso-badge');
      const t = q.subqPesos.reduce((a,v)=>a+(parseFloat(v)||0),0);
      if (badge) badge.textContent = t ? `${fmt(t)} pt` : '? pt';
    }
  }

  // acertos (numerico)
  if (el.classList.contains('acerto-num-input')) {
    const qid = el.dataset.qid;
    let v = parseInt(el.value);
    const max = parseInt(el.dataset.max);
    if (v > max) { el.value = max; v = max; }
    if (v < 0)   { el.value = 0;   v = 0; }
    S.answers[qid] = v;
  }

  // nota max
  if (el.id === 'nota-max') {
    S.notaMax = parseFloat(el.value)||10;
    renderQuestions();
  }
});

function addQuestion() {
  S.questions.push({
    id: 'q' + (++qid),
    peso: '',
    numSubq: 0,
    subqPesos: [],
  });
}
</script>
